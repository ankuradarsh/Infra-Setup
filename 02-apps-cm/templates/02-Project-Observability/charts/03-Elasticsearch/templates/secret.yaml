apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elasticsearch-secret
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: elasticsearch-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: elastisearch
        property: password