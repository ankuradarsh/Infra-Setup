apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: observability
data:
  logstash.conf: |
    input {
      beats {
        port => 5044
        client_inactivity_timeout => 300
      }
    }

    filter {

      # -----------------------------
      # Kubernetes enrichment safety
      # -----------------------------
      if [kubernetes] {

        mutate {
          add_field => {
            "namespace" => "%{[kubernetes][namespace]}"
            "pod"       => "%{[kubernetes][pod][name]}"
            "container" => "%{[kubernetes][container][name]}"
            "node"      => "%{[kubernetes][node][name]}"
          }
        }
      }

      # -----------------------------
      # Parse JSON logs if present
      # -----------------------------
      if [message] =~ "^{.*}$" {
        json {
          source => "message"
          target => "json"
          skip_on_invalid_json => true
        }
      }

      # -----------------------------
      # Clean noisy fields
      # -----------------------------
      mutate {
        remove_field => ["agent", "ecs", "input", "log", "host"]
      }

      # -----------------------------
      # Handle log levels
      # -----------------------------
      if [level] {
        mutate {
          lowercase => ["level"]
        }
      }
    }

    output {

      # ===========================
      # ERROR INDEX (SEPARATION)
      # ===========================
      if [level] == "error" or [log][level] == "error" {
        elasticsearch {
          hosts => ["http://elasticsearch.observability.svc.cluster.local:9200"]
          index => "logs-error-%{+YYYY.MM.dd}"
          user => "elastic"
          password => "LO___JhIJb8qbWBp5KNz"
        }
      }

      # ===========================
      # KUBERNETES LOGS (MAIN)
      # ===========================
      else if [namespace] {
        elasticsearch {
          hosts => ["http://elasticsearch.observability.svc.cluster.local:9200"]

          index => "logs-k8s-%{namespace}-%{+YYYY.MM.dd}"

          user => "elastic"
          password => "LO___JhIJb8qbWBp5KNz"
        }
      }

      # ===========================
      # FALLBACK INDEX
      # ===========================
      else {
        elasticsearch {
          hosts => ["http://elasticsearch.observability.svc.cluster.local:9200"]
          index => "logs-misc-%{+YYYY.MM.dd}"
          user => "elastic"
          password => "LO___JhIJb8qbWBp5KNz"
        }
      }

      # Debug (VERY useful in early stage)
      stdout {
        codec => rubydebug
      }
    }