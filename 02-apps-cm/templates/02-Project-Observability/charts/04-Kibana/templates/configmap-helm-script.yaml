apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-helm-scripts
  namespace: observability
data:
  manage-es-token.js: |
    const http = require('http');
    const https = require('https');
    const fs = require('fs');

    function getEnvVar(name, required = true) {
      if (!process.env[name]) {
        if (required) throw new Error(name + ' missing');
        return null;
      }
      return process.env[name];
    }

    // Detect protocol
    const esUrl = getEnvVar('ELASTICSEARCH_URL');
    const isHttps = esUrl.startsWith('https://');

    const client = isHttps ? https : http;

    const esAuth = getEnvVar('ELASTICSEARCH_USERNAME') + ':' + getEnvVar('ELASTICSEARCH_PASSWORD');

    // Optional CA
    let esCa = undefined;
    if (isHttps) {
      const caPath = getEnvVar('ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES', false);
      if (caPath) {
        esCa = fs.readFileSync(caPath);
      }
    }

    // Kubernetes API
    const k8sHost = process.env.KUBERNETES_SERVICE_HOST;
    const k8sPort = process.env.KUBERNETES_SERVICE_PORT_HTTPS;
    const namespace = "observability";

    const k8sToken = fs.readFileSync('/run/secrets/kubernetes.io/serviceaccount/token');
    const k8sCa = fs.readFileSync('/run/secrets/kubernetes.io/serviceaccount/ca.crt');

    function request(url, options, body) {
      return new Promise((resolve, reject) => {
        const req = client.request(url, options, res => {
          let data = '';
          res.on('data', d => data += d);
          res.on('end', () => {
            if (res.statusCode >= 200 && res.statusCode < 300) {
              resolve(data);
            } else {
              reject(`Status: ${res.statusCode}, Body: ${data}`);
            }
          });
        });

        req.on('error', reject);

        if (body) req.write(body);
        req.end();
      });
    }

    async function create() {
      console.log("Deleting old token (if exists)");
      await request(esUrl, { method: 'DELETE', auth: esAuth, ca: esCa }).catch(()=>{});

      console.log("Creating new token");
      const res = await request(esUrl, { method: 'POST', auth: esAuth, ca: esCa });

      const token = JSON.parse(res).token.value;

      const secret = JSON.stringify({
        apiVersion: "v1",
        kind: "Secret",
        metadata: { name: "kibana-es-token", namespace },
        type: "Opaque",
        data: { token: Buffer.from(token).toString('base64') }
      });

      console.log("Creating K8s secret");
      await request(
        `https://${k8sHost}:${k8sPort}/api/v1/namespaces/${namespace}/secrets`,
        {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${k8sToken}`,
            'Content-Type': 'application/json'
          },
          ca: k8sCa
        },
        secret
      );

      console.log("Done");
    }

    async function clean() {
      console.log("Deleting token from Elasticsearch");
      await request(esUrl, { method: 'DELETE', auth: esAuth, ca: esCa });

      console.log("Deleting K8s secret");
      await request(
        `https://${k8sHost}:${k8sPort}/api/v1/namespaces/${namespace}/secrets/kibana-es-token`,
        {
          method: 'DELETE',
          headers: {
            Authorization: `Bearer ${k8sToken}`
          },
          ca: k8sCa
        }
      );
    }

    const cmd = process.argv[2];

    if (cmd === 'create') {
      create().catch(e => { console.error(e); process.exit(1); });
    } else if (cmd === 'clean') {
      clean().catch(e => { console.error(e); process.exit(1); });
    } else {
      console.error("Unknown command");
      process.exit(1);
    }