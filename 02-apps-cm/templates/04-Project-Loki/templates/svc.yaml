apiVersion: v1
kind: Service
metadata:
  name: loki-appofapps-svc
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: single-binary
    app.kubernetes.io/instance: loki-appofapps
    app.kubernetes.io/name: loki
  ports:
    - name: http-metrics
      port: 3100
      targetPort: http-metrics
      protocol: TCP
      nodePort: 30100
    - name: grpc
      port: 9095
      targetPort: grpc
      protocol: TCP
      nodePort: 30095
    - name: grpclb
      port: 9096
      targetPort: grpc
      protocol: TCP
      nodePort: 30096