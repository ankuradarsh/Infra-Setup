# Deployment mode: SingleBinary (simple), SimpleScalable (medium), Distributed (large)
# deploymentMode: SingleBinary

# Number of replicas
# singleBinary:
#   replicas: 1

# Component replicas (keep at 0 for SingleBinary mode)
write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1

ui:
  enabled: true
  gateway:
    enabled: false
