
backend:
  replicas: 1
read:
  replicas: 1
write:
  replicas: 1

ui:
  enabled: true

# =============================================
# Use Local Filesystem (No S3/GCS needed)
# =============================================
loki:
  storage:
    type: filesystem
    # bucketNames is NOT needed for filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  # Important: Disable thanos object store (prevents errors)
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1        # Reduced because we have only 1 replica per component

  # Optional but recommended for small setup
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_cache_freshness_per_query: 10m
    split_queries_by_interval: 15m

# =============================================
# Disable problematic monitoring parts
# =============================================
monitoring:
  selfMonitoring:
    enabled: false
  serviceMonitor:
    enabled: false
  dashboards:
    enabled: true
  rules:
    enabled: true

grafana-agent-operator:
  enabled: false

rollout_operator:
  enabled: false

# Disable MinIO since we're using filesystem
minio:
  enabled: false