singleBinary:
  enabled: true
  replicas: 1
loki:
  auth_enabled: false
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  schemaConfig:
    configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: index_
          period: 24h
  commonConfig:
    replication_factor: 1
  compactor:
    shared_store: filesystem
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""


write:
  enabled: false
read:
  enabled: false
backend:
  enabled: false
distributor:
  enabled: false
ingester:
  enabled: false
querier:
  enabled: false
query_scheduler:
  enabled: false
index_gateway:
  enabled: false
compactor:
  enabled: false
ruler:
  enabled: false
gateway:
  enabled: false