
loki:
  auth_enabled: false
  storage:
    type: filesystem
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
    - from: "2020-10-24"
      store: filesystem
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h
singleBinary:
  enabled: true
  replicas: 1
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
gateway:
  enabled: false
