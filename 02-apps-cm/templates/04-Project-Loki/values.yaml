
backend:
  replicas: 1
read:
  replicas: 1
write:
  replicas: 1

# Enable nice Loki UI
ui:
  enabled: true

# Monitoring - safe parts only (no self-monitoring / agent operator)
monitoring:
  selfMonitoring:
    enabled: false
  serviceMonitor:
    enabled: false
  dashboards:
    enabled: true
  rules:
    enabled: true

# Extra safety to prevent any grafana-agent-operator subchart from activating
grafana-agent-operator:
  enabled: false

# Optional: Reduce CRD size issues further
rollout_operator:
  enabled: false