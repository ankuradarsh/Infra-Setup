deploymentMode: SingleBinary

singleBinary:
  replicas: 1

# Disable the other modes completely
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

test:
  enabled: false

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem
    filesystem:
      directory: /var/loki/chunks

  # ← BucketNames must be at this level (sibling of "storage")
  bucketNames:
    chunks: "chunks"
    ruler: "ruler"
    admin: "admin"

  useTestSchema: true