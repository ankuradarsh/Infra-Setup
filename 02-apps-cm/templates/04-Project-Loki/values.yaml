deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    filesystem:
      directory: /var/loki/chunks
  useTestSchema: true

chunksCache:
  enabled: true
resultsCache:
  enabled: true

singleBinary:
  enabled: true
  replicas: 1

write:
  enabled: false
read:
  enabled: false
backend:
  enabled: false

test:
  enabled: false