loki:
  loki:
    deploymentMode: SingleBinary
    # deploymentMode: Distributed
    # deploymentMode: Monolithic
    # deploymentMode: SimpleScalable
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
      filesystem:
        directory: /var/loki/chunks
    useTestSchema: true
    ui:
      enabled: true
  singleBinary:
    enabled: true
    replicas: 1
  
  tracing:
    enabled: true

  write:
    enabled: false
    replicas: 0

  read:
    enabled: false
    replicas: 0

  backend:
    enabled: false
    replicas: 0

  chunksCache:
    enabled: false

  resultsCache:
    enabled: false

  test:
    enabled: false