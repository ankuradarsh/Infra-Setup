{{- if .Values.dashboards }}
{{- $files := .Files }}

{{- range $name, $cfg := .Values.dashboards }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    grafana_dashboard: "true"
  annotations:
    grafana_folder: {{ $cfg.folder | quote }}

data:
  {{ $name }}.json: |
{{ $files.Get $cfg.file | indent 4 }}

---
{{- end }}
{{- end }}