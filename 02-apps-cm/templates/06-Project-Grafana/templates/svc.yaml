apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 32000   # choose free port (30000–32767)
      protocol: TCP