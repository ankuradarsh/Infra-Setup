alloy:
  config:
    create: true
    content: |
      // ========================
      // Discover ALL Pods
      // ========================
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // ========================
      // Relabel (FIXED)
      // ========================
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // ✅ Keep ALL namespaces
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = ".*"
          action        = "keep"
        }

        // ✅ Basic labels
        rule { source_labels = ["__meta_kubernetes_namespace"], target_label = "namespace" }
        rule { source_labels = ["__meta_kubernetes_pod_name"], target_label = "pod" }
        rule { source_labels = ["__meta_kubernetes_pod_container_name"], target_label = "container" }

        // ✅ App label (fallbacks)
        rule { source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"], target_label = "app" }
        rule { source_labels = ["__meta_kubernetes_pod_label_app"], target_label = "app" }

        // ✅ Log file path
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          target_label  = "__path__"
          separator     = "/"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }

      // ========================
      // Read logs
      // ========================
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      // ========================
      // Process logs
      // ========================
      loki.process "pod_logs" {
        stage.static_labels {
          values = { cluster = "rancher-desktop" }
        }

        forward_to = [loki.write.loki.receiver]
      }

      // ========================
      // Send to Loki (ONLY ONE)
      // ========================
      loki.write "loki" {
        endpoint {
          url = "http://loki-appofapps-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }